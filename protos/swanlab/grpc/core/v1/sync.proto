syntax = "proto3";

package swanlab.grpc.core.v1;

import "google/protobuf/empty.proto";
import "swanlab/run/v1/run.proto";
import "swanlab/settings/core/v1/core.proto";

option go_package = "github.com/swanhubx/swanlab/core/proto/swanlab/grpc/core/v1;corev1";

// CoreSyncService 用于启动本地日志读取、云端同步服务
service CoreSyncService {
    // DeliverSyncStart 接收 CoreSettings，校验并启动本地日志读取
    rpc DeliverSyncStart(DeliverSyncStartRequest) returns(DeliverSyncStartResponse);

    // DeliverSyncFinish 结束本地日志读取，开启云端同步
    rpc DeliverSyncFlush(google.protobuf.Empty) returns(DeliverSyncFlushResponse);

    // ConfirmSyncFinish 结束同步，副作用清理，退出
    rpc ConfirmSyncFinish(google.protobuf.Empty) returns(ConfirmSyncFinishResponse);
}

// DeliverSyncStart 请求，同步服务启动配置
message DeliverSyncStartRequest {
    swanlab.settings.core.v1.CoreSettings core_settings = 1; // 同步服务启动配置
    string workspace = 2;                                    // 用于标识同步到哪个工作空间上，如果不传递，默认使用start record中记录的工作空间
    string project = 3;                                      // 用于标识同步到哪个项目上，如果不传递，默认使用start record中记录的项目
    string id = 4;                                           // 运行id，如果run id在对应实验上已经存在，则等同于resume模式
}

// DeliverSyncStartResponse 同步服务启动响应
message DeliverSyncStartResponse {
    bool success = 1;   // 请求是否成功
    string message = 2; // 请求失败的响应
}


// DeliverSyncFlushResponse 开启云端同步响应
message DeliverSyncFlushResponse {
    bool success = 1;   // 请求是否成功
    string message = 2; // 请求失败的响应
    string path = 3;    // 对应的实验路径，格式为 /:username/:project_name/:slug(run_id)
}


// ConfirmSyncFinishResponse 同步服务结束响应
message ConfirmSyncFinishResponse {
    bool success = 1;   // 请求是否成功
    string message = 2; // 请求失败的响应
}