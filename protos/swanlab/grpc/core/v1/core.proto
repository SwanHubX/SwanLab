syntax = "proto3";

package swanlab.grpc.core.v1;

import "google/protobuf/empty.proto";
import "swanlab/run/v1/run.proto";
import "swanlab/metric/data/v1/data.proto";
import "swanlab/metric/column/v1/column.proto";
import "swanlab/terminal/v1/log.proto";
import "swanlab/save/v1/save.proto";
import "swanlab/operation/v1/operation.proto";
import "swanlab/settings/core/v1/core.proto";

option go_package = "github.com/swanhubx/swanlab/core/proto/swanlab/grpc/core/v1;corev1";

// CoreService 是核心业务接口，用于同步或异步地接收实验记录
service CoreService {
    // DeliverRunStart 接收单条 StartRecord，用于实验开始，并返回必要的信息。
    rpc DeliverRunStart(DeliverRunStartRequest) returns(DeliverRunStartResponse);

    // UpsertColumns 接收一组 ColumnRecord 并写入，每一条记录用于定义某一个指标
    rpc UpsertColumns(UpsertColumnsRequest) returns(google.protobuf.Empty);

    // UpsertScalars 接收一组 ScalarRecord 并写入，每一条记录用于记录某一个指标的值
    rpc UpsertScalars(UpsertScalarsRequest) returns(google.protobuf.Empty);

    // UpsertMedia 接收一组 MediaRecord 并写入，每一条记录用于记录某一个指标的值
    rpc UpsertMedia(UpsertMediaRequest) returns(google.protobuf.Empty);

    // UpsertLogs 接收一组 LogRecord 并写入，每一条记录对应一行用户的终端输出
    rpc UpsertLogs(UpsertLogsRequest) returns(google.protobuf.Empty);

    // UpsertSaves 接收一组 SaveRecord 并写入，每一条记录对应一次 swanlab.save() 的文件保存或者swanlab内部保存操作
    rpc UpsertSaves(UpsertSavesRequest) returns(google.protobuf.Empty);

    // DeliverRunFinish 接收单条 FinishRecord，用于实验结束。
    rpc DeliverRunFinish(DeliverRunFinishRequest) returns(DeliverRunFinishResponse);

    // GetOperationStats 返回 Core 当前运行状态和上传进度快照。
    rpc GetOperationStats(google.protobuf.Empty) returns(GetOperationStatsResponse);

    // ConfirmRunFinish 确认 Core 运行结束，可以安全退出
    rpc ConfirmRunFinish(google.protobuf.Empty) returns(ConfirmRunFinishResponse);
}

// DeliverRunStart 请求，生命周期函数，运行正式开始
message DeliverRunStartRequest {
    swanlab.settings.core.v1.CoreSettings core_settings = 1; // Run 服务配置
    swanlab.run.v1.StartRecord start_record = 2;             // Run 创建记录
}

// DeliverRunStart 响应
message DeliverRunStartResponse {
    bool success = 1;                   // 请求是否成功
    string message = 2;                 // 请求失败的响应
    swanlab.run.v1.StartRecord run = 3; // 最终创建的 Run 记录
    string path = 4;                    // 对应的实验路径，格式为 /:username/:project_name/:slug(run_id)
    string name = 5;                    // 对应的实验名称
    int64 global_step = 6;              // 起始全局步数
    int64 global_system_step = 7;       // 起始全局系统步数
    bool new_experiment = 8;            // 是否是新实验
}

// UpsertColumns 请求，异步插入一批列定义
message UpsertColumnsRequest {
    repeated swanlab.metric.column.v1.ColumnRecord columns = 1; // 列定义列表
}

// UpsertScalars 请求，异步插入一批标量数据
message UpsertScalarsRequest {
    repeated swanlab.metric.data.v1.ScalarRecord data = 1; // 标量记录列表
}

// UpsertMedia 请求，异步插入一批媒体数据
message UpsertMediaRequest {
    repeated swanlab.metric.data.v1.MediaRecord data = 1; // 媒体记录列表
}

// UpsertLogs 请求，异步插入一批终端输出
message UpsertLogsRequest {
    repeated swanlab.terminal.v1.LogRecord logs = 1; // 终端日志记录列表
}

// UpsertSaves 请求，异步插入一批文件保存记录
message UpsertSavesRequest {
    repeated swanlab.save.v1.SaveRecord saves = 1; // 保存记录列表
}

// DeliverRunFinish 请求，生命周期函数，运行结束
message DeliverRunFinishRequest {
    swanlab.run.v1.FinishRecord finish_record = 1; // Run 结束记录
}

// DeliverRunFinish 响应
message DeliverRunFinishResponse {
    bool success = 1;   // 请求是否成功
    string message = 2; // 请求失败的响应
}

// GetOperationStats 相应
message GetOperationStatsResponse {
    bool success = 1;                              // 请求是否成功
    string message = 2;                            // 请求失败的响应
    swanlab.operation.v1.OperationStats stats = 3; // Core 当前运行状态和上传进度快照
}

// ConfirmRunFinish 响应
message ConfirmRunFinishResponse {
    bool success = 1;   // 请求是否成功
    string message = 2; // 请求失败的响应
}
