syntax = "proto3";

package swanlab.data.v1;

option java_package = "com.swanlab.proto.data.v1";
option java_outer_classname = "EChartsProto";
option go_package = "github.com/swanlab/swanlab/proto/swanlab/data/v1;datav1";

// ECharts 可视化引用，对应 swanlab.ECharts(...)。
// ECharts option 对象序列化为 JSON 写入磁盘，Record 只保存路径引用。
// 消费方读取文件内容后直接传给前端 ECharts 实例渲染。
message EChartsValue {
  // 相对于 run_dir 的文件路径，如 "media/echarts/chart_10_a3f2.json"
  string path    = 1;
  string sha256  = 2;
  int64  size    = 3;  // 文件大小（bytes）
  string caption = 4;
}
