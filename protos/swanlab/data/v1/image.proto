syntax = "proto3";

package swanlab.data.v1;

option go_package = "github.com/swanhubx/swanlab/core/proto/swanlab/data/v1;datav1";

// 一个 key 在某个 step 下记录的全部图像（1..N 张）。
message ImageValue {
  // 存储目录，相对于 run_dir，如 "media/images"
  string path = 1;
  repeated ImageItem items = 2;
}

// 单张图像的文件引用与元数据。
message ImageItem {
  // 文件名，如 "pred_10_a3f2.png"
  string filename = 1;
  string sha256   = 2;
  int64  size     = 3;  // 文件大小（bytes）
  string format   = 4;  // "png" | "jpeg" | "gif" | "webp"
  int32  width    = 5;
  int32  height   = 6;
  int32  channels = 7;  // 1=灰度, 3=RGB, 4=RGBA
  string caption  = 8;
}
