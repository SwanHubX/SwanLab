syntax = "proto3";

package swanlab.data.v1;

option java_package = "com.swanlab.proto.data.v1";
option java_outer_classname = "AudioProto";
option go_package = "github.com/swanlab/swanlab/proto/swanlab/data/v1;datav1";

// 音频引用，对应 swanlab.Audio(...)。
// 音频数据写入磁盘，Record 只保存元数据和相对路径引用。
message AudioValue {
  // 相对于 run_dir 的文件路径，如 "media/audio/signal_5_b1c2.wav"
  string path             = 1;
  string sha256           = 2;
  int64  size             = 3;  // 文件大小（bytes）
  string format           = 4;  // "wav" | "mp3" | "flac" | "ogg"
  int32  sample_rate      = 5;  // 采样率（Hz）
  float  duration_seconds = 6;
  int32  channels         = 7;  // 1=mono, 2=stereo
  string caption          = 8;
}
