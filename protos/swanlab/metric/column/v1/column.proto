syntax = "proto3";

package swanlab.metric.column.v1;

import "swanlab/metric/data/v1/data.proto";

option go_package = "github.com/swanhubx/swanlab/core/proto/swanlab/metric/column/v1;columnv1";

// ColumnClass 列的来源类别
enum ColumnClass {
  COLUMN_CLASS_UNSPECIFIED = 0;
  COLUMN_CLASS_CUSTOM      = 1;  // 用户自定义列（默认）
}

// SectionType section 类型
enum SectionType {
  SECTION_TYPE_UNSPECIFIED = 0;
  SECTION_TYPE_PINNED      = 1;  // 固定，仅允许一个同类 section
  SECTION_TYPE_HIDDEN      = 2;  // 隐藏，仅允许一个同类 section
  SECTION_TYPE_PUBLIC      = 3;  // 公开，允许多个（默认）
  SECTION_TYPE_SYSTEM      = 4;  // 系统，允许多个，可自定义 section_name
}

// YRange Y 轴显示范围
message YRange {
  double min = 1;
  double max = 2;
}

// ColumnRecord 列定义，描述一个 metric key 的显示配置和归类规则。
// 通常在该 key 首次出现时随 MetricRecord 之前发送一次。
//
// Section 归类优先级规则：
//   1. PINNED / HIDDEN / SCALAR / MEDIA 同类只允许一个 section；
//      PUBLIC / SYSTEM 允许多个。
//   2. PINNED / HIDDEN 只能放入各自默认 section，忽略 section_name。
//   3. SYSTEM 可通过 section_name 指定 section。
//   4. CUSTOM 列未设 section_name 时，归入 MEDIA 或 SCALAR 下；
//      设了 section_name 则放入 PUBLIC 类型下。
message ColumnRecord {
  // 列类别，默认 CUSTOM
  ColumnClass column_class = 1;

  // 数据类型，必填
  swanlab.metric.data.v1.ColumnType column_type = 2;

  // 键名，必填，须与 MetricRecord.key 对应
  string column_key = 3;

  // 显示名称，可选，不填时默认取 key
  string column_name = 4;

  // 自定义 section 名称，优先级高于由 key 推断的 section
  string section_name = 5;

  // Section 类型，默认 PUBLIC
  SectionType section_type = 6;

  // Y 轴范围 [min, max]，可选
  YRange y_range = 7;

  // 图表索引，相同 chart_index 的列归入同一图表；不填则新建图表
  string chart_index = 8;

  // 图表名称，仅对单实验图表生效
  string chart_name = 9;

  // 指标名称，仅对单实验图表生效
  string metric_name = 10;

  // 指标颜色列表，十六进制颜色值，如 "#FF5733"
  repeated string metric_colors = 11;
}
