syntax = "proto3";

package swanlab.metric.data.v1;

option go_package = "github.com/swanhubx/swanlab/core/proto/swanlab/metric/data/v1;datav1";

// 一个 key 在某个 step 下记录的全部音频（1..N 条）。
message AudioValue {
  repeated AudioItem items = 1;
}

// 单条音频的文件引用与元数据。
message AudioItem {
  // 文件名，如 "sample_5_b1c2.wav"
  string filename         = 1;
  string sha256           = 2;
  int64  size             = 3;  // 文件大小（bytes）
  string caption          = 4;
}
