syntax = "proto3";

package swanlab.metric.data.v1;

option go_package = "github.com/swanhubx/swanlab/core/proto/swanlab/metric/data/v1;datav1";

// 一个 key 在某个 step 下记录的全部视频（1..N 条）。
message VideoValue {
  repeated VideoItem items = 1;
}

// 单条视频的文件引用与元数据。
message VideoItem {
  // 文件名，如 "rollout_20_d4e5.mp4"
  string filename         = 1;
  string sha256           = 2;
  int64  size             = 3;  // 文件大小（bytes）
  string caption          = 4;
}
