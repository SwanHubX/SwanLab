syntax = "proto3";

package swanlab.settings.probe.v1;

option go_package = "github.com/swanhubx/swanlab/core/proto/swanlab/settings/probe/v1;settingsprobev1";

message ProbeSettings {
    optional string run_id = 1;            // probe 侧需要校验 run_id 是否存在，不存在拒绝上报
    optional string run_dir = 2;           // probe 侧需要校验 run_dir 是否存在，不存在拒绝上报
    optional int64 global_system_step = 3; // probe 侧需要校验 global_system_step 是否存在，不存在拒绝上报
    bool hardware = 4;
    bool runtime = 5;
    bool requirements = 6;
    bool conda = 7;
    bool git = 8;
    bool swanlab = 9;
    bool monitor = 10;
    int32 monitor_interval = 11;
    string monitor_disk_dir = 12;
}
