syntax = "proto3";

package swanlab.env.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/swanhubx/swanlab/core/proto/swanlab/env/v1;envv1";

// 运行开始时采集一次的主机与环境元数据引用（swanlab-metadata.json）。
// 元数据结构定义见 swanlab/env/v1/metadata.proto；文件路径约定为 "files/swanlab-metadata.json"。
message MetadataRecord {
  google.protobuf.Timestamp timestamp = 1;
}

// 运行开始时采集的 Python 包依赖引用（requirements.txt）。
// 路径引用约定为 "files/requirements.txt"，使用txt解析。
message RequirementsRecord {
  google.protobuf.Timestamp timestamp = 1;
}

// 运行开始时采集的 Conda 环境引用（conda.yml）。
// 路径引用约定为 "files/conda.yml"，使用yaml解析。
message CondaRecord {
  google.protobuf.Timestamp timestamp = 1;
}
