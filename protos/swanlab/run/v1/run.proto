syntax = "proto3";

package swanlab.run.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/swanhubx/swanlab/core/proto/swanlab/run/v1;runv1";

// Run 创建记录，对应 swanlab.init(...) 调用，写入一次。
message RunRecord {
  string project         = 1;
  string workspace       = 2;  // 组织或用户名
  string name            = 3;
  string description     = 4;
  repeated string tags   = 5;
  string group           = 6;
  string job_type        = 7;
  string color           = 8;  // 十六进制颜色，如 "#FF5733"
  string id              = 9;
  ResumeMode resume      = 10;
  google.protobuf.Timestamp started_at = 11;
}

// Run 结束记录，对应 swanlab.finish() 或进程退出，写入一次。
message FinishRecord {
  RunState state    = 1;
  int32    exit_code = 2;
  // 异常信息，state=CRASHED 时填充
  string   error    = 3;
  google.protobuf.Timestamp finished_at = 4;
}

enum RunState {
  RUN_STATE_RUNNING     = 0;
  RUN_STATE_FINISHED    = 1;  // 正常结束
  RUN_STATE_CRASHED     = 2;  // 异常退出
  RUN_STATE_STOPPED     = 3;  // 用户主动中断（KeyboardInterrupt 等）
}

enum ResumeMode {
  RESUME_MODE_NEVER       = 0;
  RESUME_MODE_ALLOW       = 1;
  RESUME_MODE_MUST        = 2;
}
