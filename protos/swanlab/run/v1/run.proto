syntax = "proto3";

package swanlab.run.v1;

import "google/protobuf/timestamp.proto";

option java_package = "com.swanlab.proto.run.v1";
option java_outer_classname = "RunProto";
option go_package = "github.com/swanlab/swanlab/proto/swanlab/run/v1;runv1";

// Run 创建记录，对应 swanlab.init(...) 调用，写入一次。
message RunRecord {
  string run_id          = 1;
  string experiment_name = 2;
  string project_name    = 3;
  string workspace       = 4;  // 组织或用户名
  string description     = 5;
  repeated string tags   = 6;
  string group           = 7;
  string job_type        = 8;
  string color           = 9;  // 十六进制颜色，如 "#FF5733"
  ResumeMode resume      = 10;
  google.protobuf.Timestamp started_at = 11;
}

// Run 结束记录，对应 swanlab.finish() 或进程退出，写入一次。
message FinishRecord {
  RunState state    = 1;
  int32    exit_code = 2;
  // 异常信息，state=CRASHED 时填充
  string   error    = 3;
  google.protobuf.Timestamp finished_at = 4;
}

enum RunState {
  RUN_STATE_UNSPECIFIED = 0;
  RUN_STATE_RUNNING     = 1;
  RUN_STATE_FINISHED    = 2;  // 正常结束
  RUN_STATE_CRASHED     = 3;  // 异常退出
  RUN_STATE_STOPPED     = 4;  // 用户主动中断（KeyboardInterrupt 等）
}

enum ResumeMode {
  RESUME_MODE_UNSPECIFIED = 0;
  RESUME_MODE_NEVER       = 1;
  RESUME_MODE_ALLOW       = 2;
  RESUME_MODE_MUST        = 3;
}
