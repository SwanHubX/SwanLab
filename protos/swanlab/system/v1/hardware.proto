syntax = "proto3";

package swanlab.system.v1;

import "google/protobuf/timestamp.proto";

option java_package = "com.swanlab.proto.system.v1";
option java_outer_classname = "HardwareProto";
option go_package = "github.com/swanlab/swanlab/proto/swanlab/system/v1;systemv1";

// ═══════════════════════════════════════════════════════
// 静态硬件信息：run 开始时采集一次，写入 MetadataRecord
// ═══════════════════════════════════════════════════════

message HardwareInfo {
  string     hostname   = 1;
  string     os         = 2;  // "Linux" | "Windows" | "macOS"
  string     os_version = 3;
  string     arch       = 4;  // "x86_64" | "arm64"
  CpuInfo    cpu        = 5;
  repeated GpuInfo gpus = 6;
  MemoryInfo memory     = 7;
  DiskInfo   disk       = 8;
}

message CpuInfo {
  int32  logical_count  = 1;  // 逻辑核心数（含超线程）
  int32  physical_count = 2;  // 物理核心数
  string brand          = 3;  // 如 "Intel Core i9-13900K"
  float  frequency_mhz  = 4;  // 基础频率
}

message GpuInfo {
  int32  index              = 1;
  string name               = 2;  // 如 "NVIDIA GeForce RTX 4090"
  int64  memory_total_bytes = 3;
  string driver_version     = 4;
  string cuda_version       = 5;  // 仅 NVIDIA，如 "12.2"
  string vendor             = 6;  // "nvidia" | "amd" | "apple" | "intel"
}

message MemoryInfo {
  int64 total_bytes = 1;
}

message DiskInfo {
  int64  total_bytes = 1;
  string mount       = 2;  // 被监控目录所在的挂载点，如 "/" 或 "C:"
}

// ═══════════════════════════════════════════════════════
// 运行时监控指标：按 hardware.interval 周期性写入
// ═══════════════════════════════════════════════════════

message StatsRecord {
  google.protobuf.Timestamp timestamp = 1;
  CpuStats     cpu     = 2;
  repeated GpuStats gpus = 3;
  MemoryStats  memory  = 4;
  DiskStats    disk    = 5;
  NetworkStats network = 6;
}

message CpuStats {
  float usage_percent             = 1;  // 所有核心的平均利用率（%）
  repeated float per_core_percent = 2;  // 每个逻辑核心的利用率（%）
}

message GpuStats {
  int32 index                = 1;
  float usage_percent        = 2;  // GPU 核心利用率（%）
  int64 memory_used_bytes    = 3;
  float memory_usage_percent = 4;
  float temperature_celsius  = 5;
  float power_watts          = 6;
  float fan_speed_percent    = 7;
}

message MemoryStats {
  int64 used_bytes      = 1;
  int64 available_bytes = 2;
  float usage_percent   = 3;
}

message DiskStats {
  float usage_percent = 1;  // 磁盘空间使用率（%）
  int64 read_bytes    = 2;  // 自上次采集的增量读取字节数
  int64 write_bytes   = 3;  // 自上次采集的增量写入字节数
}

message NetworkStats {
  int64 bytes_sent = 1;  // 自上次采集的增量发送字节数
  int64 bytes_recv = 2;  // 自上次采集的增量接收字节数
}
