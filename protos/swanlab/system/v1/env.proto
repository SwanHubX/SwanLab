syntax = "proto3";

package swanlab.system.v1;

import "swanlab/system/v1/hardware.proto";

option java_package = "com.swanlab.proto.system.v1";
option java_outer_classname = "EnvProto";
option go_package = "github.com/swanlab/swanlab/proto/swanlab/system/v1;systemv1";

// run 开始时采集一次的全量主机元数据，打包 HardwareInfo 和 EnvironmentInfo。
message MetadataRecord {
  HardwareInfo    hardware = 1;
  EnvironmentInfo env      = 2;
}

// 软件运行环境信息
message EnvironmentInfo {
  string python_version  = 1;  // 如 "3.11.5"
  string swanlab_version = 2;
  string platform        = 3;  // sys.platform，如 "linux" | "darwin" | "win32"
  string cwd             = 4;  // 当前工作目录绝对路径

  // 已安装的 Python 包，package_name -> version
  // 由 env.requirements=true 时填充
  map<string, string> packages = 5;

  // 由 env.git=true 时填充
  GitInfo git = 6;

  // 由 env.conda=true 时填充
  string conda_env    = 7;  // conda 环境名
  string conda_python = 8;  // conda python 可执行文件路径

  // 选择性记录的环境变量（由配置白名单控制）
  map<string, string> env_vars = 9;

  // HPC/集群场景
  string slurm_job_id    = 10;
  string slurm_node_list = 11;
}

message GitInfo {
  string commit = 1;   // 完整 commit SHA
  string branch = 2;
  string remote = 3;   // origin remote URL
  bool   dirty  = 4;   // 是否存在未提交的改动
  string root   = 5;   // git 仓库根目录绝对路径
}
