syntax = "proto3";

package swanlab.config.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/swanhubx/swanlab/core/proto/swanlab/config/v1;configv1";

// 用户传入的实验配置引用。
// config 数据写入磁盘（files/config.yaml），Record 只保存更新类型，路径引用约定为 "files/config.yaml"，使用yaml解析。
// PATCH 更新时覆写同一个文件，消费方以最新文件内容为准。
message ConfigRecord {
  UpdateType update_type  = 3;
  google.protobuf.Timestamp timestamp = 4;
}

enum UpdateType {
  UPDATE_TYPE_UNSPECIFIED = 0;
  UPDATE_TYPE_INIT        = 1;  // init() 时传入的完整 config
  UPDATE_TYPE_PATCH       = 2;  // 运行中通过 run.config.update() 的增量更新（覆写同文件）
}
