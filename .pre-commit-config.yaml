repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff-check
        # Avoid auto-fixing during pre-commit: when staged and unstaged changes
        # touch the same file, pre-commit's stash/restore flow can conflict.
        # args: [--fix]
      - id: ruff-format
